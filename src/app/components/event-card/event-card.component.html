<article
  class="event-card"
  [class.compact]="compact"
  [style.--event-color]="event.color"
  [style.height.px]="height"
  cdkDrag
  [cdkDragData]="event"
  [cdkDragDisabled]="!draggable"
  (cdkDragStarted)="onDragStarted()"
  (cdkDragEnded)="onDragEnded()"
  (click)="confirmDelete()"
>
  <div class="event-card__accent"></div>

  <div class="event-card__body">
    <div class="event-card__top">
      <h3 class="event-card__title">{{ event.title }}</h3>
      <span class="event-card__time">{{ event.startTime }} – {{ event.endTime }}</span>
    </div>
    <p class="event-card__location" *ngIf="event.description && !compact">{{ event.description }}</p>
  </div>

  <ng-template cdkDragPreview [matchSize]="true">
    <article class="event-card" [style.--event-color]="event.color">
      <div class="event-card__accent"></div>
      <div class="event-card__body">
        <div class="event-card__top">
          <h3 class="event-card__title">{{ event.title }}</h3>
          <span class="event-card__time">{{ event.startTime }} – {{ event.endTime }}</span>
        </div>
        <p class="event-card__location" *ngIf="event.description && !compact">{{ event.description }}</p>
      </div>
    </article>
  </ng-template>
</article>
